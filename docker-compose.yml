services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wenshu-postgres
    environment:
      POSTGRES_DB: wenshu
      POSTGRES_USER: wenshu
      POSTGRES_PASSWORD: wenshu
    ports:
      - "5432:5432"
    volumes:
      - wenshu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wenshu -d wenshu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wenshu-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wenshu_pgdata:
