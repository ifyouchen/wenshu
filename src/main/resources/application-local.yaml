spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${WENSHU_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wenshu}
    username: ${WENSHU_DATASOURCE_USERNAME:wenshu}
    password: ${WENSHU_DATASOURCE_PASSWORD:wenshu}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${WENSHU_REDIS_HOST:localhost}
      port: ${WENSHU_REDIS_PORT:6379}
      password: ${WENSHU_REDIS_PASSWORD:}
      timeout: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.czx.wenshu: DEBUG
