spring:
  application:
    name: wenshu
  datasource:
    url: ${WENSHU_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wenshu}
    username: ${WENSHU_DATASOURCE_USERNAME:wenshu}
    password: ${WENSHU_DATASOURCE_PASSWORD:wenshu}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${WENSHU_REDIS_HOST:localhost}
      port: ${WENSHU_REDIS_PORT:6379}
      password: ${WENSHU_REDIS_PASSWORD:}
      timeout: 2s
  mail:
    host: ${WENSHU_SMTP_HOST:}
    port: ${WENSHU_SMTP_PORT:587}
    username: ${WENSHU_SMTP_USERNAME:}
    password: ${WENSHU_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${WENSHU_SMTP_AUTH:true}
          ssl:
            enable: ${WENSHU_SMTP_SSL_ENABLE:false}
          starttls:
            enable: ${WENSHU_SMTP_STARTTLS_ENABLE:true}
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true
  thymeleaf:
    check-template-location: false
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.czx.wenshu.interfaces.rest

wenshu:
  product-name: 文枢 wenshu
  api-version: v1
  base-url: ${WENSHU_WEB_BASE_URL:http://localhost:5173}
  mail:
    enabled: ${WENSHU_MAIL_ENABLED:true}
    from: ${WENSHU_MAIL_FROM:}
  llm:
    creative-model: claude-sonnet-4-6
    utility-model: deepseek-chat
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
  storage:
    provider: cos
    region: ${TENCENT_COS_REGION:ap-shanghai}
    bucket: ${TENCENT_COS_BUCKET:}
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    custom-domain: ${TENCENT_COS_CUSTOM_DOMAIN:}
    presigned-url-ttl-minutes: ${TENCENT_COS_PRESIGNED_URL_TTL_MINUTES:60}
