spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:wenshu_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
      timeout: 100ms
  flyway:
    enabled: false
  sql:
    init:
      mode: never

wenshu:
  mail:
    enabled: false
