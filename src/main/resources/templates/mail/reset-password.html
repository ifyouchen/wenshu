<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
.container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.header { background-color: #dc2626; padding: 32px 24px; text-align: center; }
.header h1 { color: #ffffff; margin: 0; font-size: 24px; }
.content { padding: 32px 24px; }
.content p { color: #374151; font-size: 16px; line-height: 1.6; margin: 0 0 16px; }
.btn { display: inline-block; background-color: #dc2626; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-size: 16px; margin: 8px 0; }
.footer { padding: 16px 24px; text-align: center; color: #9ca3af; font-size: 12px; border-top: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>文枢 wenshu</h1>
</div>
<div class="content">
<p>您好，</p>
<p>我们收到了您的密码重置请求。请点击下方按钮设置新密码：</p>
<p style="text-align: center;">
<a th:href="${resetUrl}" class="btn">重置密码</a>
</p>
<p>或复制以下链接到浏览器打开：</p>
<p style="word-break: break-all; color: #6b7280; font-size: 14px;" th:text="${resetUrl}"></p>
<p>此链接 24 小时内有效。如果您没有请求重置密码，请忽略此邮件，您的密码不会被更改。</p>
</div>
<div class="footer">
<p>此邮件由系统自动发送，请勿回复。</p>
<p>文枢 wenshu &mdash; 面向长篇创作者的 AI 写作工作台</p>
</div>
</div>
</body>
</html>
