<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全告警</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
.container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.header { background-color: #ea580c; padding: 32px 24px; text-align: center; }
.header h1 { color: #ffffff; margin: 0; font-size: 24px; }
.content { padding: 32px 24px; }
.content p { color: #374151; font-size: 16px; line-height: 1.6; margin: 0 0 16px; }
.alert-box { background-color: #fef2f2; border-left: 4px solid #dc2626; padding: 16px; margin: 16px 0; border-radius: 4px; }
.alert-box p { color: #991b1b; margin: 0; font-size: 14px; }
.footer { padding: 16px 24px; text-align: center; color: #9ca3af; font-size: 12px; border-top: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>文枢 wenshu 安全告警</h1>
</div>
<div class="content">
<p>您好，</p>
<p>您的账号发生以下安全事件：</p>
<div class="alert-box">
<p><strong th:text="${alertType}"></strong></p>
<p th:text="${alertDetail}"></p>
</div>
<p th:if="${alertTime}" style="color: #6b7280; font-size: 14px;" th:text="'事件时间：' + ${alertTime}"></p>
<p>如果这不是您本人操作，请立即修改密码并检查账号安全设置。</p>
</div>
<div class="footer">
<p>此邮件由系统自动发送，请勿回复。</p>
<p>文枢 wenshu &mdash; 面向长篇创作者的 AI 写作工作台</p>
</div>
</div>
</body>
</html>
