<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证您的邮箱</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
.container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.header { background-color: #4f46e5; padding: 32px 24px; text-align: center; }
.header h1 { color: #ffffff; margin: 0; font-size: 24px; }
.content { padding: 32px 24px; }
.content p { color: #374151; font-size: 16px; line-height: 1.6; margin: 0 0 16px; }
.btn { display: inline-block; background-color: #4f46e5; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-size: 16px; margin: 8px 0; }
.footer { padding: 16px 24px; text-align: center; color: #9ca3af; font-size: 12px; border-top: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>文枢 wenshu</h1>
</div>
<div class="content">
<p>您好，</p>
<p>感谢注册文枢！您的注册验证码是：</p>
<p style="text-align: center; margin: 24px 0;">
<span style="display:inline-block; letter-spacing: 8px; font-size: 32px; font-weight: 700; color: #4f46e5;" th:text="${verificationCode}">000000</span>
</p>
<p>验证码有效期至 <span th:text="${expiresAt}"></span>。如果您没有注册文枢账号，请忽略此邮件。</p>
</div>
<div class="footer">
<p>此邮件由系统自动发送，请勿回复。</p>
<p>文枢 wenshu &mdash; 面向长篇创作者的 AI 写作工作台</p>
</div>
</div>
</body>
</html>
